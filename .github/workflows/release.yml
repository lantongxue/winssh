name: Release

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      shell: bash
      run: |
        npm ci
        if [ $? -ne 0 ]; then
          rm -rf node_modules package-lock.json
          npm install
        fi

    - name: Build
      run: npm run build

    - name: Build distributables
      run: |
        if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
          npm run dist:linux
        elif [ "${{ matrix.os }}" == "windows-latest" ]; then
          npm run dist:win
        elif [ "${{ matrix.os }}" == "macos-latest" ]; then
          npm run dist:mac
        fi
      env:
        WINSSH_UPDATE_BASE_URL: ${{ secrets.WINSSH_UPDATE_BASE_URL }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SKIP_PUBLISH: 'false'