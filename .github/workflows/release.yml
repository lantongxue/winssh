name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to release (e.g. v1.1.2)'
        required: false
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
          - os: windows-latest
            arch: x64
          - os: macos-15-intel
            arch: Intel
          - os: macos-latest
            arch: arm64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      shell: bash
      run: |
        npm ci
        if [ $? -ne 0 ]; then
          rm -rf node_modules package-lock.json
          npm install
        fi

    - name: Determine release tag
      id: release_tag
      shell: bash
      run: |
        if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
          if [ -z "${{ github.event.inputs.tag }}" ]; then
            echo 'Tag is required for manual dispatch' >&2
            exit 1
          fi
          echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
        else
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        fi

    - name: Determine release version
      id: release_version
      shell: bash
      run: |
        tag="${{ steps.release_tag.outputs.tag }}"
        echo "version=${tag#v}" >> $GITHUB_OUTPUT

    - name: Build
      run: npm run build

    - name: Build distributables
      shell: bash
      run: |
        if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
          npm run dist:linux -- --publish=never
        elif [ "${{ matrix.os }}" == "windows-latest" ]; then
          npm run dist:win -- --publish=never
        elif [ "${{ matrix.os }}" == "macos-15-intel" ] || [ "${{ matrix.os }}" == "macos-latest" ]; then
          npm run dist:mac -- --publish=never
        fi
      env:
        SKIP_PUBLISH: 'true'

    - name: Determine release files
      id: release_files
      shell: bash
      run: |
        version="${{ steps.release_version.outputs.version }}"
        dir="release/${version}"

        if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
          patterns=("*.AppImage" "*.deb" "latest-linux.yml")
        elif [ "${{ matrix.os }}" == "windows-latest" ]; then
          patterns=("*-Setup.exe" "*.zip" "latest.yml")
        elif [ "${{ matrix.os }}" == "macos-15-intel" ] || [ "${{ matrix.os }}" == "macos-latest" ]; then
          patterns=("*.dmg" "*.zip" "latest-mac.yml")
        else
          echo "Unsupported OS: ${{ matrix.os }}" >&2
          exit 1
        fi

        files=()
        for pat in "${patterns[@]}"; do
          for f in ${dir}/${pat}; do
            if [ -f "$f" ]; then
              files+=("$f")
            fi
          done
        done

        if [ ${#files[@]} -eq 0 ]; then
          echo "No release artifacts found for ${dir} on ${GITHUB_RUNNER_OS}" >&2
          exit 1
        fi

        echo "files<<EOF" >> $GITHUB_OUTPUT
        printf '%s\n' "${files[@]}" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Extract release notes
      id: release_notes
      shell: bash
      run: |
        tag="${{ steps.release_tag.outputs.tag }}"
        version="${tag#v}"
        awk "/^## \[${version}\]/ {flag=1; next} /^## \[/ {if (flag) exit} flag {print}" CHANGELOG.md > release-notes.md
        if [ ! -s release-notes.md ]; then
          echo "No changelog entry found for ${version}" >&2
          exit 1
        fi
        echo "body<<EOF" >> $GITHUB_OUTPUT
        cat release-notes.md >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Publish GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        tag_name: ${{ steps.release_tag.outputs.tag }}
        name: ${{ steps.release_tag.outputs.tag }}
        body: ${{ steps.release_notes.outputs.body }}
        files: ${{ steps.release_files.outputs.files }}
      env:
        SKIP_PUBLISH: 'true'