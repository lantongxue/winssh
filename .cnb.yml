.release-env: &release-env
  runner:
    tags: cnb:arch:amd64
    cpus: 8
  docker:
    image: node:22-bookworm
    volumes:
      - /root/.npm
      - electron-cache:/root/.cache/electron:rw
      - electron-builder-cache:/root/.cache/electron-builder:rw
  env:
    ELECTRON_CACHE: /root/.cache/electron
    ELECTRON_BUILDER_CACHE: /root/.cache/electron-builder
    WINSSH_UPDATE_BASE_URL: https://example.com/winssh-updates
  lock:
    key: winssh-release-$CNB_BRANCH
    wait: true
    cancel-in-progress: false

.release-preflight: &release-preflight
  name: release-preflight
  script: |
    set -eu
    if [ "$CNB_EVENT" = "web_trigger_release" ] && [ -z "${CNB_BRANCH:-}" ]; then
      echo "web_trigger_release must run from a branch or tag page."
      exit 1
    fi
    npm install
    npm run lint
    npm run typecheck
    npm run test

.create-release: &create-release
  name: create-release
  type: git:release
  options:
    tag: $CNB_BRANCH
    description: WinSSH $CNB_BRANCH

.upload-release-assets: &upload-release-assets
  name: upload-release-assets
  image: cnbcool/attachments:latest
  settings:
    tag: $CNB_BRANCH
    attachments:
      - release/*/*.exe
      - release/*/*.zip
      - release/*/*.dmg
      - release/*/*.AppImage
      - release/*/*.deb
      - release/*/*.yml
      - release/*/*.blockmap
      - release/*/*.json
  exports:
    FILES: RELEASE_FILES

.release-summary: &release-summary
  name: release-summary
  script: |
    set -eu
    echo "Release tag: $CNB_BRANCH"
    echo "Uploaded files: ${RELEASE_FILES:-}"

.build-windows: &build-windows
  <<: *release-env
  name: build-windows
  stages:
    - *release-preflight
    - name: build-windows-artifacts
      script: |
        set -eu
        apt-get update
        apt-get install -y --no-install-recommends wine64 mono-complete
        npm run dist:win
      timeout: 2h
    - *create-release
    - *upload-release-assets
    - *release-summary

.build-macos: &build-macos
  <<: *release-env
  name: build-macos
  stages:
    - *release-preflight
    - name: build-macos-artifacts
      script: |
        set -eu
        npm run dist:mac
      timeout: 2h
    - *create-release
    - *upload-release-assets
    - *release-summary

.build-linux: &build-linux
  <<: *release-env
  name: build-linux
  stages:
    - *release-preflight
    - name: build-linux-artifacts
      script: |
        set -eu
        apt-get update
        apt-get install -y --no-install-recommends libarchive-tools rpm
        npm run dist:linux
      timeout: 2h
    - *create-release
    - *upload-release-assets
    - *release-summary

$:
  tag_push:
    - *build-windows
    - *build-macos
    - *build-linux
  web_trigger_release:
    - *build-windows
    - *build-macos
    - *build-linux
